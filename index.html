
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bantay Bayan Internal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      if (typeof tailwind !== 'undefined') {
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                // Custom semantic colors if needed
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Simulating San Francisco Font Stack */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        min-height: 100vh;
        transition: background 0.5s ease, color 0.5s ease;
      }

      /* LIGHT MODE DEFAULT - IMPROVED CONTRAST */
      body {
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); /* Slate 50 to 200 - Lighter background */
        color: #020617; /* Slate 950 - Almost Black for text */
      }

      /* DARK MODE OVERRIDE */
      html.dark body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); /* Slate 900 to 800 */
        color: #f8fafc; /* Slate 50 */
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.05);
      }
      html.dark ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
      }
      
      /* 
         Glass Panel: Adapts to mode
      */
      .glass-panel {
        /* Light Mode Glass - More opaque for readability */
        background: rgba(255, 255, 255, 0.95); 
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(226, 232, 240, 0.8); /* Slate 200 */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
      }

      html.dark .glass-panel {
        /* Dark Mode Glass */
        background: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      }
      
      /* Sidebar styling */
      .glass-sidebar {
        background: rgba(255, 255, 255, 0.98); /* Almost solid in light mode */
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-right: 1px solid rgba(0, 0, 0, 0.08);
        color: #0f172a; /* Slate 900 */
      }

      html.dark .glass-sidebar {
        background: rgba(15, 23, 42, 0.8); 
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
      }
      
      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }
      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up {
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideDown {
        from { transform: translateY(-20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-down {
        animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Utilities */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Mobile safe area */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="color: white; padding: 20px; background: #991b1b; margin: 20px; border-radius: 8px;">' +
            '<h2 style="margin-top: 0;">Runtime Error</h2>' +
            '<p>' + msg + '</p>' +
            '<pre style="font-size: 12px; opacity: 0.8;">' + (error ? error.stack : '') + '</pre>' +
            '</div>';
        }
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root">
        <div style="height:100vh; width:100vw; display:flex; align-items:center; justify-content:center; background: #0f172a;">
            <div style="width: 32px; height: 32px; border: 3px solid #334155; border-top-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
